<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a6fa5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <title>Spillsamling</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .hub-container {
      width: 100%;
      max-width: 600px;
      padding: 0 16px 40px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .welcome-text {
      text-align: center;
      font-size: 1.1rem;
      color: var(--color-text-light);
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1 data-i18n="hubTitle">Spillsamling</h1>
    <button class="lang-toggle" id="langToggle" aria-label="Change language">🇳🇴</button>
  </header>

  <main class="hub-container">
    <p class="welcome-text" data-i18n="hubWelcome">Velg et spill å spille!</p>
    <div class="games-grid" id="gamesGrid"></div>
    <div style="margin-top:24px; width:100%;">
      <a id="statsLinkA" href="stats.html" class="btn btn-outline"
         data-i18n="statsLink"
         style="display:flex; text-decoration:none; justify-content:center;">📊 Statistikk</a>
    </div>
  </main>

  <script>
    // ===== Language system =====
    const i18n = {
      no: {
        hubTitle: 'Spillsamling',
        hubWelcome: 'Velg et spill å spille!',
        statsLink: '📊 Statistikk',
      },
      en: {
        hubTitle: 'Game Collection',
        hubWelcome: 'Choose a game to play!',
        statsLink: '📊 Statistics',
      }
    };

    // ===== Game registry — add new games here =====
    const games = [
      {
        id: 'tallpyramide',
        icon: '🔺',
        titleNO: 'Tallpyramide',
        titleEN: 'Number Pyramid',
        descNO: 'Fyll inn de manglende tallene i pyramiden!',
        descEN: 'Fill in the missing numbers in the pyramid!',
        href: 'games/tallpyramide.html'
      }
      // { id: 'next-game', icon: '🎲', titleNO: '...', titleEN: '...', descNO: '...', descEN: '...', href: 'games/next.html' }
    ];

    let lang = localStorage.getItem('gameLang') || 'no';

    function setLang(l) {
      lang = l;
      localStorage.setItem('gameLang', lang);
      document.getElementById('langToggle').textContent = lang === 'no' ? '🇳🇴' : '🇬🇧';
      document.documentElement.lang = lang === 'no' ? 'no' : 'en';
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      const statsEl = document.getElementById('statsLinkA');
      if (statsEl) statsEl.href = 'stats.html?lang=' + lang;
      renderGames();
    }

    function renderGames() {
      const grid = document.getElementById('gamesGrid');
      grid.innerHTML = '';
      games.forEach(g => {
        const a = document.createElement('a');
        a.className = 'game-card';
        a.href = g.href + '?lang=' + lang;
        a.innerHTML = `
          <div class="card-icon">${g.icon}</div>
          <div class="card-title">${lang === 'no' ? g.titleNO : g.titleEN}</div>
          <div class="card-desc">${lang === 'no' ? g.descNO : g.descEN}</div>
        `;
        grid.appendChild(a);
      });
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      setLang(lang === 'no' ? 'en' : 'no');
    });

    setLang(lang);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
